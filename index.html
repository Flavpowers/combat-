<!DOCTYPE html>
<html lang="fr">

<meta charset="UTF-8">
<title>Pokédex 151</title>
<style>
*{box-sizing:border-box;}
body{font-family:Arial;text-align:center;background:#111;color:white;margin:0;padding:10px;}
.topbar{display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap;}
#grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;max-width:820px;margin:auto;}
@media(max-width:600px){#grid{grid-template-columns:repeat(6,1fr);}}
.cell{background:#222;padding:4px;border-radius:6px;font-size:10px;height:80px;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:transform 0.1s;}
.cell.found{background:#1e3a1e;cursor:pointer;}.cell.found:hover{transform:scale(1.08);}
.cell.shinyFound{background:#2a2a00;border:1px solid gold;}
.cell img{width:44px;height:44px;}
.cell .num{color:#666;font-size:9px;}
.cell .pname{font-size:9px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px;}
.input-row{display:flex;justify-content:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
input{padding:8px;border-radius:6px;border:1px solid #444;background:#222;color:white;font-size:14px;width:200px;}
button{padding:7px 13px;cursor:pointer;border-radius:6px;border:1px solid #555;background:#333;color:white;font-size:13px;transition:background 0.15s;}
button:hover{background:#444;}button:disabled{opacity:0.35;cursor:default;}
.shiny-badge{color:gold;}
/* Overlay */
#overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:200;overflow-y:auto;padding:12px;}
#overlayBox{background:#1a1a1a;border-radius:14px;padding:20px;max-width:880px;margin:16px auto;text-align:center;}
/* Tabs dans overlay */
.tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid #444;}
.tab{padding:8px 16px;cursor:pointer;font-size:13px;color:#aaa;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab.active{color:white;border-bottom-color:lime;}
.tab:hover{color:white;}
.tabContent{display:none;}.tabContent.active{display:block;}
/* Cartes sélection */
.selCard{background:#222;padding:7px;border-radius:8px;cursor:pointer;text-align:center;font-size:10px;border:2px solid transparent;transition:all 0.15s;}
.selCard.selected{border-color:lime;background:#1a2a1a;}
.selCard img{width:44px;}
/* Combat */
#battle{display:none;margin-top:20px;justify-content:center;gap:16px;flex-wrap:wrap;}
.teamBox{background:#1a1a1a;padding:10px;border-radius:10px;width:240px;}
.pokeCard{margin-bottom:8px;padding:7px;background:#222;border-radius:8px;transition:opacity 0.4s;}
.hpbar,.xpbar{width:100%;border-radius:4px;overflow:hidden;}
.hpbar{height:9px;background:#3a3a3a;margin-top:4px;}
.xpbar{height:5px;background:#2a2a2a;margin-top:3px;}
.hpfill{height:100%;transition:width 0.5s ease;}
.xpfill{height:100%;background:cyan;transition:width 0.5s;}
.green{background:limegreen;}.orange{background:orange;}.red{background:#e33;}
#log{width:270px;background:#1a1a1a;padding:10px;height:380px;overflow-y:auto;border-radius:10px;text-align:left;font-size:12px;line-height:1.75;}
.logLine{padding:2px 0;border-bottom:1px solid #222;animation:fadeIn 0.3s;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none}}
.atk-btn{margin:3px;font-size:11px;padding:6px 10px;border-radius:6px;transition:all 0.1s;}
.atk-btn:active{transform:scale(0.95);}
.atk-btn:disabled{opacity:0.3;}
.tbadge{font-size:9px;padding:1px 6px;border-radius:4px;display:inline-block;margin-left:2px;font-weight:bold;}
/* Tableau moves */
.move-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px;}
.move-table th{color:#888;font-weight:normal;padding:3px 5px;border-bottom:1px solid #333;text-align:left;}
.move-table td{padding:4px 5px;border-bottom:1px solid #2a2a2a;}
.move-table tr.learned{background:#1a2a1a;}
.move-table tr.active-move{background:#1a1a2a;}
.move-cb{cursor:pointer;width:14px;height:14px;}
</style>
</head>

// Retourne toutes les attaques apprises jusqu'au niveau donné
function allLearnedMoves(id,lvl){
  let pool=(MP[id]||[{n:"Charge",t:"normal",p:35,l:1}]).filter(m=>m.l<=lvl);
  if(!pool.length) pool=[{n:"Charge",t:"normal",p:35,l:1}];
  return pool;
}

// Retourne les 4 attaques actives (par défaut les 4 dernières apprises)
function defaultActiveMoves(id,lvl){
  let all=allLearnedMoves(id,lvl);
  return all.slice(-4).map(m=>m.n);
}

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let found =JSON.parse(localStorage.getItem("found"))||[];
let shiny  =JSON.parse(localStorage.getItem("shiny"))||{};
let roster =JSON.parse(localStorage.getItem("roster"))||[];
let wins   =parseInt(localStorage.getItem("wins"))||0;

function saveAll(){
  localStorage.setItem("found",JSON.stringify(found));
  localStorage.setItem("shiny",JSON.stringify(shiny));
  localStorage.setItem("roster",JSON.stringify(roster));
  localStorage.setItem("wins",wins);
}

function enemyLvl(){return Math.max(1,Math.floor(2*Math.pow(1.18,wins)))+Math.floor(Math.random()*3);}

// ══════════════════════════════════════════════
// POKÉDEX
// ══════════════════════════════════════════════
function norm(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function findId(v){
  v=v.trim();let n=parseInt(v);
  if(!isNaN(n)&&n>=1&&n<=151)return n;
  let l=norm(v);
  for(let i=0;i<names.length;i++)if(norm(names[i])===l)return i+1;
  return null;
}

function add(){
  let v=document.getElementById("input").value.trim(),id=findId(v);
  if(!id||found.includes(id)){
    document.getElementById("input").style.borderColor="#f55";
    setTimeout(()=>document.getElementById("input").style.borderColor="",800);
    return;
  }
  found.push(id);
  if(Math.random()<1/64)shiny[id]=true;
  saveAll();render();
  document.getElementById("input").value="";
}

function getSprite(id){return shiny[id]?`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${id}.png`:`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;}
function badge(t){let c=typeColor[t]||"#888";return `<span class="tbadge" style="background:${c}22;color:${c};border:1px solid ${c}44">${t}</span>`;}

function render(){
  let g=document.getElementById("grid");g.innerHTML="";
  for(let i=1;i<=151;i++){
    let d=document.createElement("div"),f=found.includes(i),s=f&&shiny[i];
    d.className="cell"+(s?" shinyFound":f?" found":"");
    d.innerHTML=f?`<img src="${getSprite(i)}" loading="lazy"><div class="num">#${i}</div><div class="pname">${names[i-1]}${s?'<span class="shiny-badge">★</span>':''}</div>`:`<div class="num">#${i}</div><div style="font-size:22px;color:#333">?</div>`;
    g.appendChild(d);
  }
  document.getElementById("count").textContent=found.length;
  document.getElementById("shinyCount").textContent=Object.keys(shiny).length;
  document.getElementById("winsSpan").textContent=wins;
  document.getElementById("battleBtn").disabled=!found.some(id=>basePokemon.has(id));
}

function reset(){if(!confirm("Tout réinitialiser ?"))return;localStorage.clear();found=[];shiny={};roster=[];wins=0;hideBattle();render();}
function giveUp(){found=[...Array(151)].map((_,i)=>i+1);saveAll();render();}

// ══════════════════════════════════════════════
// CRÉATION POKÉMON
// ══════════════════════════════════════════════
function xpNeed(lvl){return Math.floor(25+lvl*lvl*0.9);}

function makePoke(id,lvl){
  lvl=Math.min(100,lvl||1);
  let t=ptype[id-1]||"normal";
  let mhp=Math.floor(40+lvl*6+(lvl>15?lvl*3:0));
  let activeNames=defaultActiveMoves(id,lvl);
  return {id,name:names[id-1],type:t,level:lvl,xp:0,xpNeed:xpNeed(lvl),maxHp:mhp,hp:mhp,activeMoves:activeNames};
}

// Obtenir les objets move complets depuis les noms actifs
function getActiveMoveObjs(p){
  let all=allLearnedMoves(p.id,p.level);
  return p.activeMoves.map(n=>all.find(m=>m.n===n)||{n,t:"normal",p:35,l:1});
}

// OVERLAY
// ══════════════════════════════════════════════
function showOv(html){document.getElementById("overlayBox").innerHTML=html;document.getElementById("overlay").style.display="block";}
function hideOv(){document.getElementById("overlay").style.display="none";}

// ══════════════════════════════════════════════
// SÉLECTION + GESTION MOVES DU ROSTER
// ══════════════════════════════════════════════
let teamSel=[];

function prepareBattle(){openTeamSelect();}

function openTeamSelect(){
  let avail=found.filter(id=>basePokemon.has(id));
  if(!avail.length){alert("Aucune première évolution trouvée !");return;}
  teamSel=roster.map(p=>p.id).filter(id=>avail.includes(id));

  let eLvlEst=Math.floor(2*Math.pow(1.18,wins));
  renderTeamSelectOv(avail,eLvlEst);
}

function renderTeamSelectOv(avail,eLvlEst){
  // Onglets : 1 par pokemon du roster + sélection
  let rosterPokes=roster.filter(p=>avail.includes(p.id));

  let tabsHtml=`<div class="tabs">
    <div class="tab active" id="tab-sel" onclick="switchTab('sel')">Sélection équipe</div>
    ${rosterPokes.map(p=>`<div class="tab" id="tab-p${p.id}" onclick="switchTab('p${p.id}')">${p.name} Lv.${p.level}</div>`).join("")}
  </div>`;

  // Contenu onglet sélection
  let cards=avail.map(id=>{
    let inR=roster.find(p=>p.id===id);
    let sel=teamSel.includes(id);
    return `<div class="selCard${sel?" selected":""}" id="sc${id}" onclick="toggleSel(${id})">
      <img src="${getSprite(id)}"><br>
      <b>#${id} ${names[id-1]}</b><br>
      ${badge(ptype[id-1]||"normal")}
      ${inR?`<br><span style="color:lime;font-size:10px">Lv.${inR.level}</span><br><span style="color:#aaa;font-size:9px">${inR.activeMoves.length} attaques</span>`:`<br><span style="color:#666;font-size:9px">Nouveau (Lv.1)</span>`}
    </div>`;
  }).join("");

  let selContent=`<div class="tabContent active" id="content-sel">
    <p style="color:#aaa;font-size:12px;margin:0 0 10px">Victoires : <b>${wins}</b> — Niveau ennemi : ~<b>${eLvlEst}</b> — Sélectionne jusqu'à 3</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;max-height:50vh;overflow-y:auto;">${cards}</div>
    <div style="margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button onclick="confirmTeam()">⚔️ Confirmer et combattre</button>
      <button onclick="hideOv()">Annuler</button>
    </div>
  </div>`;

  // Onglets moves pour chaque pokemon du roster
  let movesContents=rosterPokes.map(p=>`<div class="tabContent" id="content-p${p.id}">${renderMoveEditor(p)}</div>`).join("");

  showOv(`<h2 style="margin:0 0 10px">Équipe & Attaques</h2>${tabsHtml}${selContent}${movesContents}`);
}

function switchTab(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tabContent").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  document.getElementById("content-"+id).classList.add("active");
}

function renderMoveEditor(p){
  let all=allLearnedMoves(p.id,p.level);
  let rows=all.map(m=>{
    let active=p.activeMoves.includes(m.n);
    let c=typeColor[m.t]||"#999";
    return `<tr class="${active?"active-move":"learned"}">
      <td><input type="checkbox" class="move-cb" ${active?"checked":""} onchange="toggleMove(${p.id},'${m.n}',this)" ${!active&&p.activeMoves.length>=4?"disabled":""}></td>
      <td><b>${m.n}</b></td>
      <td>${badge(m.t)}</td>
      <td style="color:${m.p?c:"#666"}">${m.p||"—"}</td>
      <td style="color:#666">Lv.${m.l}</td>
    </tr>`;
  }).join("");

  return `<div style="margin-top:6px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <img src="${getSprite(p.id)}" style="width:50px">
      <div style="text-align:left">
        <div style="font-weight:bold">${p.name} ${badge(p.type)}</div>
        <div style="font-size:11px;color:#aaa">Lv.${p.level} · ${p.activeMoves.length}/4 attaques actives</div>
      </div>
    </div>
    <p style="font-size:11px;color:#888;margin:0 0 8px">Coche exactement 4 attaques à utiliser en combat.</p>
    <table class="move-table">
      <tr><th></th><th>Attaque</th><th>Type</th><th>Puis.</th><th>Apprise</th></tr>
      ${rows}
    </table>
  </div>`;
}

function toggleMove(id,moveName,cb){
  let p=roster.find(r=>r.id===id);
  if(!p)return;
  if(cb.checked){
    if(p.activeMoves.length>=4){cb.checked=false;return;}
    p.activeMoves.push(moveName);
  } else {
    if(p.activeMoves.length<=1){cb.checked=true;return;}
    p.activeMoves=p.activeMoves.filter(n=>n!==moveName);
  }
  // Mettre à jour disabled sur les autres cases
  let all=allLearnedMoves(p.id,p.level);
  let full=p.activeMoves.length>=4;
  all.forEach(m=>{
    // retrouver la checkbox
    // on rerender l'onglet plutôt
  });
  saveAll();
  // Rerender l'onglet
  document.getElementById(`content-p${id}`).innerHTML=renderMoveEditor(p);
}

function toggleSel(id){
  let i=teamSel.indexOf(id);
  if(i>=0){teamSel.splice(i,1);}
  else{if(teamSel.length>=3){alert("Max 3 !");return;}teamSel.push(id);}
  document.querySelectorAll("[id^='sc']").forEach(el=>{
    let sid=parseInt(el.id.slice(2));
    el.classList.toggle("selected",teamSel.includes(sid));
  });
}

function confirmTeam(){
  if(!teamSel.length){alert("Sélectionne au moins 1 Pokémon !");return;}
  let team=teamSel.map(id=>{
    let ex=roster.find(p=>p.id===id);
    let p=ex?JSON.parse(JSON.stringify(ex)):makePoke(id,1);
    p.hp=p.maxHp; // PV pleins
    return p;
  });
  hideOv();startBattle(team);
}

// ══════════════════════════════════════════════
// COMBAT
// ══════════════════════════════════════════════
let player=[],enemy=[],curP=0,curE=0,over=false,busy=false;

function startBattle(team){
  player=team;
  let el=enemyLvl();
  let pool=[...basePokemon].filter(id=>id!==132).sort(()=>Math.random()-0.5).slice(0,3);
  enemy=pool.map(id=>makePoke(id,el+Math.floor(Math.random()*3)));
  curP=0;curE=0;over=false;busy=false;
  document.getElementById("battle").style.display="flex";
  document.getElementById("log").innerHTML="";
  log(`⚔️ Combat #${wins+1} — ennemis niveau ~${el}`);
  showTeams();showAttacks();
}

function hpCol(r){return r>0.6?"green":r>0.3?"orange":"red";}

function drawTeam(team,div){
  document.getElementById(div).innerHTML=team.map(p=>{
    let r=Math.max(0,p.hp/p.maxHp);
    let xr=p.level>=100?1:Math.min(1,p.xp/p.xpNeed);
    return `<div class="pokeCard" style="opacity:${p.hp<=0?0.3:1}">
      <div style="display:flex;align-items:center;gap:7px">
        <img src="${getSprite(p.id)}" style="width:38px">
        <div style="text-align:left;flex:1">
          <div style="font-size:11px;font-weight:bold">${p.name} ${badge(p.type)}</div>
          <div style="font-size:10px;color:#aaa">Lv.${p.level} · ${Math.max(0,p.hp)}/${p.maxHp} PV</div>
        </div>
      </div>
      <div class="hpbar"><div class="hpfill ${hpCol(r)}" style="width:${Math.round(r*100)}%"></div></div>
      <div class="xpbar"><div class="xpfill" style="width:${Math.round(xr*100)}%"></div></div>
    </div>`;
  }).join("");
}

function showTeams(){drawTeam(player,"playerTeam");drawTeam(enemy,"enemyTeam");}

function showAttacks(){
  let az=document.getElementById("atkZone");
  az.innerHTML="";
  if(over||busy)return;
  let p=player[curP];
  if(!p||p.hp<=0)return;
  let moves=getActiveMoveObjs(p);
  let btns=moves.map((m,i)=>{
    let c=typeColor[m.t]||"#999";
    return `<button class="atk-btn" style="border-color:${c}66;color:${c};background:#1a1a1a" onclick="doAtk(${i})">
      <span style="font-weight:bold">${m.n}</span>
      <span style="font-size:9px;color:#888;margin-left:4px">${badge(m.t)} ${m.p?m.p+"p":"—"}</span>
    </button>`;
  }).join("");
  az.innerHTML=`<div style="font-size:11px;color:#aaa;margin-bottom:5px">⚡ <b style="color:white">${p.name}</b> attaque :</div>${btns}`;
}

function log(t){
  let l=document.getElementById("log");
  let d=document.createElement("div");
  d.className="logLine";d.innerHTML=t;
  l.appendChild(d);l.scrollTop=9999;
}

function effTxt(m){return m>=2?" <b style='color:lime'>Super efficace!</b>":m===0?" <b style='color:#f55'>Aucun effet!</b>":m<1?" <i style='color:#fa0'>Peu efficace…</i>":"";}

function calcDmg(move,atkLvl,defType){
  if(!move.p)return{d:0,m:1};
  let m=multi(move.t,defType);
  let d=Math.max(1,Math.floor((move.p*0.28+atkLvl*1.6)*(0.85+Math.random()*0.15)*m));
  return{d,m};
}

function syncRoster(p){
  let i=roster.findIndex(r=>r.id===p.id);
  let c=JSON.parse(JSON.stringify(p));
  if(i>=0)roster[i]=c;
  else if(roster.length<6)roster.push(c);
}

// Délai entre les actions (ms)
const DELAY_ATK=900;
const DELAY_KO=600;

function disableAtks(){
  busy=true;
  document.getElementById("atkZone").querySelectorAll("button").forEach(b=>b.disabled=true);
}

function doAtk(mi){
  if(over||busy)return;
  disableAtks();

  let p=player[curP],e=enemy[curE];
  let moves=getActiveMoveObjs(p);
  let move=moves[mi];
  let eType=ptype[e.id-1]||"normal";

  // Attaque joueur
  if(move.p>0){
    let{d,m}=calcDmg(move,p.level,eType);
    e.hp=Math.max(0,e.hp-d);
    log(`${p.name} → <b>${move.n}</b> ${badge(move.t)} : <b>${d}</b> dégâts${effTxt(m)}`);
  } else {
    log(`${p.name} utilise <b>${move.n}</b>`);
  }
  showTeams();

  if(e.hp<=0){
    setTimeout(()=>{
      log(`💥 <b>${e.name}</b> est K.O. !`);
      // XP
      if(p.level<100){
        let xpG=Math.floor(8+e.level*2.2);
        p.xp+=xpG;
        log(`<span style="color:cyan">+${xpG} XP pour ${p.name}</span>`);
        while(p.xp>=p.xpNeed&&p.level<100){
          p.xp-=p.xpNeed;p.level++;p.xpNeed=xpNeed(p.level);
          let mhp=Math.floor(40+p.level*6+(p.level>15?p.level*3:0));
          p.maxHp=mhp;p.hp=Math.min(p.hp+15,mhp);
          // Nouvelles attaques apprises ?
          let newMoves=allLearnedMoves(p.id,p.level).filter(m=>m.l===p.level);
          newMoves.forEach(nm=>{
            log(`<span style="color:#fa0">📖 ${p.name} apprend <b>${nm.n}</b> !</span>`);
          });
          // Ajouter automatiquement si slot libre, sinon signaler
          if(p.activeMoves.length<4){
            newMoves.forEach(nm=>{if(p.activeMoves.length<4&&!p.activeMoves.includes(nm.n))p.activeMoves.push(nm.n);});
          }
          log(`<span style="color:lime">⬆️ ${p.name} est niveau <b>${p.level}</b> !</span>`);
          // Évolution
          let ev=evolutions[p.id];
          if(ev&&(ev.l===null||p.level>=ev.l)){
            let old=p.name;
            p.id=ev.to;p.name=names[p.id-1];p.type=ptype[p.id-1]||p.type;
            // Nouvelles attaques après évolution
            p.activeMoves=defaultActiveMoves(p.id,p.level);
            log(`<span style="color:gold">✨ <b>${old}</b> évolue en <b>${p.name}</b> !</span>`);
            if(!found.includes(p.id))found.push(p.id);
          }
        }
        if(p.level>=100){p.xp=0;log(`<span style="color:gold">🏅 ${p.name} est niveau MAX (100) !</span>`);}
      }
      syncRoster(p);
      curE++;
      showTeams();
      if(curE>=enemy.length){onVictory();return;}
      busy=false;showAttacks();
    },DELAY_KO);
    return;
  }

  // Riposte ennemie après délai
  setTimeout(()=>{
    let e2=enemy[curE];
    let pType=ptype[p.id-1]||"normal";
    let eMoves=getActiveMoveObjs(e2);
    let em=eMoves[Math.floor(Math.random()*eMoves.length)];
    if(em.p>0){
      let{d:d2,m:m2}=calcDmg(em,e2.level,pType);
      p.hp=Math.max(0,p.hp-d2);
      log(`${e2.name} → <b>${em.n}</b> ${badge(em.t)} : <b>${d2}</b> dégâts${effTxt(m2)}`);
    } else {
      log(`${e2.name} utilise <b>${em.n}</b>`);
    }
    showTeams();

    if(p.hp<=0){
      setTimeout(()=>{
        log(`💀 <b>${p.name}</b> est K.O.`);
        syncRoster(p);curP++;
        while(curP<player.length&&player[curP].hp<=0)curP++;
        showTeams();
        if(curP>=player.length){onDefeat();return;}
        busy=false;showAttacks();
      },DELAY_KO);
    } else {
      syncRoster(p);saveAll();
      busy=false;showAttacks();
    }
  },DELAY_ATK);
}

function onVictory(){
  over=true;wins++;saveAll();render();showTeams();
  log(`🏆 <b>Victoire ! Combat ${wins} gagné !</b>`);
  let choix=enemy.map((e,i)=>`
    <div class="selCard" onclick="captureEnemy(${i})" style="display:inline-block;margin:6px;width:110px;vertical-align:top">
      <img src="${getSprite(e.id)}" style="width:50px"><br>
      <b>${e.name}</b><br>${badge(ptype[e.id-1]||"normal")}<br>
      <span style="color:#aaa;font-size:10px">Lv.${e.level}</span>
    </div>`).join("");
  showOv(`<h2>🏆 Victoire !</h2><p style="color:#aaa">Choisis le Pokémon ennemi à capturer :</p><div>${choix}</div><div style="margin-top:14px"><button onclick="skipCap()">Passer</button></div>`);
}

function captureEnemy(i){
  let e=enemy[i];
  if(roster.length>=6){
    showOv(`<h2>Roster plein (6/6)</h2><p>Libère un Pokémon pour capturer <b>${e.name}</b> :</p>${rosterManageHtml(e.id,e.level)}`);
  } else doCapture(e);
}

function doCapture(e){
  if(!found.includes(e.id))found.push(e.id);
  let np=makePoke(e.id,e.level);
  let idx=roster.findIndex(r=>r.id===e.id);
  if(idx>=0){roster[idx]=np;log(`${e.name} déjà dans le roster, mis à jour.`);}
  else{roster.push(np);}
  log(`<span style="color:lime">➕ ${e.name} Lv.${e.level} capturé !</span>`);
  saveAll();render();hideOv();postBtns();
}

function rosterManageHtml(cid,clvl){
  return `<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px">
  ${roster.map((p,i)=>`<div class="selCard" style="width:100px">
    <img src="${getSprite(p.id)}" style="width:38px"><br>
    <b>${p.name}</b><br>Lv.${p.level}<br>
    <button style="font-size:10px;margin-top:5px;padding:3px 8px" onclick="releaseFor(${i},${cid},${clvl})">Libérer</button>
  </div>`).join("")}
  </div><div style="margin-top:12px"><button onclick="skipCap()">Annuler</button></div>`;
}
function releaseFor(ri,cid,clvl){log(`🔓 ${roster[ri].name} libéré.`);roster.splice(ri,1);doCapture({id:cid,level:clvl,name:names[cid-1]});}
function skipCap(){hideOv();postBtns();}

function onDefeat(){
  over=true;showTeams();
  log(`😞 <b>Défaite !</b>`);
  if(!roster.length){postBtns();return;}
  let li=Math.floor(Math.random()*roster.length),lost=roster[li];
  roster.splice(li,1);
  log(`<span style="color:#f55">💔 ${lost.name} a été capturé par l'ennemi !</span>`);
  saveAll();render();
  showOv(`<h2>😞 Défaite</h2><p><b>${lost.name}</b> t'a été volé !</p><img src="${getSprite(lost.id)}" style="width:70px;filter:grayscale(1);opacity:0.4"><br><button style="margin-top:14px" onclick="hideOv();postBtns()">OK</button>`);
}

function postBtns(){
  document.getElementById("atkZone").innerHTML=`
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">
      <button onclick="openTeamSelect()">🔄 Changer d'équipe / gérer attaques</button>
      <button onclick="replayTeam()">⚔️ Recombattre (même équipe)</button>
    </div>`;
}

function replayTeam(){
  if(!teamSel.length){openTeamSelect();return;}
  let team=teamSel.map(id=>{
    let ex=roster.find(p=>p.id===id);
    let p=ex?JSON.parse(JSON.stringify(ex)):makePoke(id,1);
    p.hp=p.maxHp;return p;
  });
  startBattle(team);
}

function hideBattle(){document.getElementById("battle").style.display="none";}

render();
</script>
</body>
</html>
